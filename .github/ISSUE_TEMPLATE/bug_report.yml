name: Bug report
description: Report a reproducible implementation defect or unsafe output.
title: "[Bug]: "
labels: [bug]
body:
  - type: textarea
    id: behavior
    attributes:
      label: Observed behavior
      description: Remove all personal data and secrets.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior and reason code
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal synthetic reproduction
    validations:
      required: true
  - type: checkboxes
    id: safety
    attributes:
      label: Safety confirmation
      options:
        - label: This report contains no real student data, credentials or private vulnerability details.
          required: true
